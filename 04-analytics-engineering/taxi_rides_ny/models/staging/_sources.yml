version: 2

sources:
  - name: staging
    description: Raw NYC taxi data loaded via Kestra into BigQuery
    database: food-security-pipeline
    schema: ny_taxi

    tables:
      - name: yellow_tripdata
        description: >
          Yellow taxi trip records for NYC (2024-01 to 2024-06).
          Loaded from TLC parquet files via Kestra workflow orchestration.
        columns:
          - name: VendorID
            description: >
              A code indicating the TPEP provider that provided the record.
              1 = Creative Mobile Technologies, 2 = VeriFone Inc.
          - name: tpep_pickup_datetime
            description: The date and time when the meter was engaged
          - name: tpep_dropoff_datetime
            description: The date and time when the meter was disengaged
          - name: passenger_count
            description: The number of passengers in the vehicle (driver-entered)
          - name: trip_distance
            description: The elapsed trip distance in miles
          - name: RatecodeID
            description: >
              The final rate code in effect at the end of the trip.
              1=Standard rate, 2=JFK, 3=Newark, 4=Nassau or Westchester,
              5=Negotiated fare, 6=Group ride
          - name: store_and_fwd_flag
            description: >
              Whether the trip record was held in vehicle memory before sending to vendor.
              Y = store and forward trip, N = not a store and forward trip
          - name: PULocationID
            description: TLC Taxi Zone where the taximeter was engaged
          - name: DOLocationID
            description: TLC Taxi Zone where the taximeter was disengaged
          - name: payment_type
            description: >
              A numeric code signifying how the passenger paid.
              1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided trip
          - name: fare_amount
            description: The time-and-distance fare calculated by the meter
          - name: extra
            description: Miscellaneous extras and surcharges (rush hour, overnight)
          - name: mta_tax
            description: $0.50 MTA tax triggered based on metered rate in use
          - name: tip_amount
            description: Tip amount (auto-populated for credit card tips; cash tips not included)
          - name: tolls_amount
            description: Total amount of all tolls paid in trip
          - name: improvement_surcharge
            description: $0.30 improvement surcharge assessed on hailed trips at flag drop
          - name: total_amount
            description: The total amount charged to passengers (does not include cash tips)
          - name: congestion_surcharge
            description: Total amount collected for NYS congestion surcharge
          - name: Airport_fee
            description: $1.25 for pick up only at LaGuardia and John F. Kennedy Airports
