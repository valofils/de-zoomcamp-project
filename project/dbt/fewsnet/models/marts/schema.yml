version: 2

models:
  - name: dim_countries
    description: "Static country dimension with names and sub-region groupings."
    columns:
      - name: country_code
        tests: [not_null, unique]
      - name: country_name
        tests: [not_null]
      - name: sub_region
        tests: [not_null]

  - name: fct_food_insecurity
    description: >
      Core fact table: Phase 3+ population estimates per country / period / scenario.
      Sourced from FEWS NET ipcpopulationsize endpoint.
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: country_code
        tests: [not_null]
      - name: period_date
        tests: [not_null]
      - name: scenario
        tests:
          - not_null
          - accepted_values:
              values: ['CS', 'ML', 'PN']
      - name: pop_phase3plus
        tests: [not_null]

  - name: dm_crisis_trends
    description: >
      Annual Phase 3+ population trend per country (latest period per year,
      Current Situation only). Powers the temporal dashboard tile.
    columns:
      - name: country_code
        tests: [not_null]
      - name: period_year
        tests: [not_null]
      - name: pop_phase3plus
        tests: [not_null]
